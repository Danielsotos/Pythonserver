<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robots SBS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <main class="robot-card">
            <img src="/pictures/producto-Ranger-GTP-768x566.jpg" alt="Robot SBS">
            <p id="current-user" class="session-badge"></p>
            <p class="eyebrow">Línea SBS</p>
            <h1>Registrar Robot SBS</h1>

            <label for="id">ID del robot</label>
            <input type="text" id="id" placeholder="Ingrese el ID del robot SBS">

            <label for="comment">Comentario inicial</label>
            <input type="text" id="comment" placeholder="Comentario del registro">

            <div class="hero-actions left-actions">
                <button onclick="submitRobot()">Guardar robot</button>
                <button onclick="toggleRobotList()">Mostrar lista</button>
                <button onclick="window.location.href='/incidencias'">Ver incidencias</button>
                <button onclick="window.location.href='/index'">Volver</button>
            </div>

            <div id="resultado"></div>
            <div id="ultimo-id"></div>
            <div id="lista-robots"></div>
            <button class="link-button" onclick="logout()">Cerrar sesión</button>
        </main>
    </div>

    <div id="incident-modal" class="modal-backdrop" hidden>
        <div class="modal-card">
            <h2>Registrar incidencia</h2>
            <label for="incident-robot-id">Robot afectado</label>
            <input type="text" id="incident-robot-id" readonly>

            <label for="incident-type">Tipo de error</label>
            <select id="incident-type" onchange="updatePriorityByType()">
                <option value="LIDAR">LIDAR</option>
                <option value="Choque">Choque</option>
                <option value="Parada de emergencia">Parada de emergencia</option>
                <option value="Otro">Otro</option>
            </select>

            <label for="incident-priority">Prioridad</label>
            <select id="incident-priority">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>

            <label for="incident-description">Detalle</label>
            <textarea id="incident-description" placeholder="Describe la falla"></textarea>

            <div class="hero-actions left-actions">
                <button onclick="submitIncident()">Guardar incidencia</button>
                <button class="link-button" onclick="closeIncidentModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/robot.js"></script>
</body>
</html>
