<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-4xl mx-auto">
            <!-- Robot Image Card -->
            <div class="robot-card mb-8">
                <div class="text-center">
                    <img
                        src="/pictures/producto-Ranger-GTP-768x566.jpg"
                        alt="Robot SBS"
                        class="w-full max-w-md mx-auto rounded-xl shadow-2xl mb-4"
                    >
                    <h3 class="text-xl font-semibold text-white mb-2">Robot Ranger GTP</h3>
                </div>
            </div>

            <!-- Control Panel -->
            <div class="robot-card mb-8">
                <h3 class="text-2xl font-semibold text-white mb-6 text-center">
                </h3>

                <!-- Input Section -->
                <div class="mb-6">
                    <label for="id" class="block text-sm font-medium text-gray-300 mb-2">
                        <i class="fas fa-id-badge mr-2"></i>ID
                    </label>
                    <input
                        type="text"
                        id="id"
                        placeholder="Ingrese el ID del robot SBS"
                        class="w-full px-4 py-3 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all duration-300"
                    >
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <button onclick="enviarID()" class="btn-primary">
                        <i class="fas fa-paper-plane mr-2"></i>
                        Enviar ID
                    </button>
                    <button onclick="mostrarLista()" class="btn-secondary">
                        <i class="fas fa-list mr-2"></i>
                        Mostrar Lista
                    </button>
                    <button onclick="volver()" class="btn-tertiary">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Volver
                    </button>
                </div>
            </div>

            <!-- Results Section -->
            <div class="robot-card">
                <h3 class="text-2xl font-semibold text-white mb-6 text-center">
                    <i class="fas fa-chart-bar text-purple-400 mr-2"></i>
                    Resultados y Lista
                </h3>

                <!-- Result Messages -->
                <div id="resultado" class="mb-4"></div>
                <div id="ultimo-id" class="mb-4"></div>

                <!-- Robots List -->
                <div id="lista-robots" class="space-y-3"></div>
            </div>
        </main>

        <!-- Back to Home -->
        <div class="text-center mt-8">
            <a href="/" class="inline-flex items-center text-gray-400 hover:text-white transition-colors duration-300">
                <i class="fas fa-home mr-2"></i>
                Volver al Inicio
            </a>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
